version: '3.8'

services:
  simutrans-build:
    build:
      context: .
      dockerfile: Dockerfile
    image: simutrans-build:latest
    container_name: simutrans-build
    volumes:
      # ソースコードをマウント
      - .:/simutrans
      # ビルド成果物を永続化（オプション）
      - build-cache:/simutrans/build
    working_dir: /simutrans
    # インタラクティブモード
    stdin_open: true
    tty: true
    # 環境変数
    environment:
      - MAKEFLAGS=-j$(nproc)
    # コンテナ起動時のコマンド
    command: /bin/bash

  # 開発環境用（VSCodeのDevContainerなど）
  simutrans-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: simutrans-build:latest
    container_name: simutrans-dev
    volumes:
      - .:/simutrans
      - build-cache:/simutrans/build
      # Git設定を共有（オプション）
      - ~/.gitconfig:/root/.gitconfig:ro
    working_dir: /simutrans
    stdin_open: true
    tty: true
    environment:
      - MAKEFLAGS=-j$(nproc)
    command: /bin/bash

  # MinGW クロスコンパイル環境（Windows用バイナリ生成）
  simutrans-mingw:
    build:
      context: .
      dockerfile: Dockerfile.mingw
    image: simutrans-mingw:latest
    container_name: simutrans-mingw
    volumes:
      - .:/simutrans
      - mingw-build-cache:/simutrans/build-mingw
    working_dir: /simutrans
    stdin_open: true
    tty: true
    environment:
      - MAKEFLAGS=-j$(nproc)
      - OSTYPE=mingw
    command: /bin/bash

volumes:
  build-cache:
  mingw-build-cache:
